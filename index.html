<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&F Comércio de Grãos - Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100% ); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 800px; width: 100%; padding: 40px; text-align: center; }
        h1 { color: #333; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { color: #666; margin-bottom: 40px; font-size: 1.1em; }
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .tool-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 8px; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tool-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4); }
        .tool-card h2 { font-size: 1.5em; margin-bottom: 10px; }
        .tool-card p { font-size: 0.9em; opacity: 0.9; }
        .tool-card.fluxo { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .tool-card.bi { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        @media (max-width: 600px) { .tools-grid { grid-template-columns: 1fr; } h1 { font-size: 1.8em; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 A&F Comércio de Grãos</h1>
        <p class="subtitle">Portal Unificado de Gestão Financeira e Análise de Mercado</p>
        <div class="tools-grid">
            <a href="docs/fluxo-caixa.html" class="tool-card fluxo">
                <h2>📊 Fluxo de Caixa</h2>
                <p>Gestão financeira 2026 com gráficos e alertas</p>
            </a>
            <a href="docs/bi-graos.html" class="tool-card bi">
                <h2>📈 BI de Grãos</h2>
                <p>Análise de preços e fretes por cidade</p>
            </a>
        </div>
    </div>
</body>
</html>
